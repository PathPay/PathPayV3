kind = "web"
previewPath = "/"
title = "PathPay"
version = "1.0.0"
id = "artifacts/pathpay"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21030

[services.development]
run = PORT=3000 BASE_PATH=/ pnpm --filter @workspace/pathpay run dev

[services.production]
build = [ "pnpm", "--filter", "@workspace/pathpay", "run", "build" ]
publicDir = "artifacts/pathpay/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21030"
BASE_PATH = "/"
